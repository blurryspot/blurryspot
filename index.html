<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blurryspot | 捕捉失焦的声音</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d0d0d;
            --accent-blue: #4a90e2;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            cursor: crosshair; /* 增加艺术感的光标 */
        }

        /* --- 背景氛围层 --- */
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 9999;
        }

        .bg-blobs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(120px);
            opacity: 0.4;
        }

        .blob {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: var(--accent-blue);
            border-radius: 50%;
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* --- 导航 --- */
        nav {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 30px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-blue);
            text-shadow: 0 0 10px var(--accent-blue);
        }

        /* --- 英雄区 --- */
        .hero {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .visual-engine {
            position: relative;
            margin-bottom: 60px;
        }

        .avatar-capsule {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
            z-index: 2;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 音乐播放时的头像“失焦”震动感 */
        .avatar-capsule.playing {
            animation: vibe 1.5s infinite ease-in-out;
            box-shadow: 0 0 50px rgba(74, 144, 226, 0.2);
        }

        @keyframes vibe {
            0%, 100% { transform: scale(1); filter: blur(0px); }
            50% { transform: scale(1.03); filter: blur(3px); }
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.4);
        }

        .liquid-glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(74, 144, 226, 0.2) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        /* --- 文本样式 --- */
        .highlight {
            font-family: 'Space Mono', monospace;
            color: var(--accent-blue);
            margin-bottom: 15px;
            font-size: 18px;
        }

        .cursor {
            animation: blink 1s infinite;
            font-weight: bold;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .hero-title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .blue-italic {
            color: var(--accent-blue);
            font-style: italic;
            transition: 0.3s;
        }

        /* 悬浮时的色散效果 */
        .hero-title:hover .blue-italic {
            text-shadow: 3px 0 #ff0055, -3px 0 #00ff95;
        }

        .hero-sub {
            color: var(--text-dim);
            max-width: 500px;
            margin: 0 auto;
        }

        /* --- 跑马灯 --- */
        .marquee {
            width: 100%;
            padding: 40px 0;
            overflow: hidden;
            border-top: 1px solid var(--border);
            background: rgba(255,255,255,0.01);
        }

        .marquee-track {
            display: flex;
            width: 200%;
            animation: scroll 30s linear infinite;
        }

        .marquee span {
            font-size: 100px;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.05);
            text-transform: uppercase;
            padding-right: 100px;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* --- 播放器模块 --- */
        .projects {
            padding: 100px 20px;
        }

        .glass-player {
            max-width: 600px;
            margin: 0 auto;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
        }

        .status-box { color: var(--accent-blue); }
        .dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--accent-blue);
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        audio {
            width: 100%;
            margin: 20px 0;
            filter: invert(1) hue-rotate(180deg) brightness(1.5);
            opacity: 0.4;
            transition: 0.3s;
        }

        audio:hover { opacity: 0.8; }

        .upload-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            border: 1px solid var(--accent-blue);
            border-radius: 50px;
            color: var(--accent-blue);
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
            font-weight: bold;
        }

        .upload-btn:hover {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 0 30px rgba(74, 144, 226, 0.4);
        }

        .legal-notice {
            margin-top: 30px;
            font-size: 10px;
            color: #555;
            letter-spacing: 1px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .hero-title { font-size: 3rem; }
            .avatar-capsule { width: 180px; height: 180px; }
            nav { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="grain-overlay"></div>
    <div class="bg-blobs">
        <div class="blob"></div>
    </div>

    <nav>
        <div class="nav-brand">BLURRYSPOT_</div>
        <div class="nav-links">
            <a href="#">163 MUSIC</a>
            <a href="#projects">ARCHIVE</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="visual-engine">
                <div class="avatar-capsule">
                    <img src="avatar.png" alt="blurryspot" class="avatar-img" onerror="this.src='https://via.placeholder.com/300/111/4a90e2?text=VOICE'">
                </div>
                <div class="liquid-glow"></div>
            </div>

            <div class="content-engine">
                <div class="highlight">
                    <span id="typing"></span><span class="cursor">_</span>
                </div>
                <h1 class="hero-title">捕捉<span class="blue-italic">失焦</span>的声音</h1>
                <p class="hero-sub">捕捉那些被城市噪音淹没的颗粒感。我是一名独立音乐人，正在寻找声音的边界。</p>
            </div>
        </section>

        <div class="marquee">
            <div class="marquee-track">
                <span>drifting in noise</span>
                <span>drifting in noise</span>
                <span>drifting in noise</span>
                <span>drifting in noise</span>
            </div>
        </div>

        <section id="projects" class="projects">
            <div class="glass-player">
                <div class="player-header">
                    <div class="status-box">
                        <span class="dot"></span> LIVE SIGNAL
                    </div>
                    <span class="track-display">READY TO RECEIVE...</span>
                </div>
                
                <audio id="main-audio" controls></audio>

                <div class="upload-area">
                    <input type="file" id="audio-input" accept="audio/*" hidden>
                    <label for="audio-input" class="upload-btn">
                        LOAD FRAGMENTS / 载入碎片
                    </label>
                </div>

                <div class="legal-notice">
                    © 2026 BLURRYSPOT. ALL SOUNDS RESERVED.
                </div>
            </div>
        </section>
    </main>

    <script>
        // 1. 增强型打字机逻辑
        const text = "Hi, I'm Blurryspot.";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typing").innerText += text.charAt(i);
                i++;
                setTimeout(typeWriter, 120);
            }
        }

        // 2. 鼠标跟随交互 (Interactive Glow)
        const glow = document.querySelector('.liquid-glow');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 60;
            const y = (e.clientY / window.innerHeight - 0.5) * 60;
            glow.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        });

        // 3. 音频上传与视觉联动
        const input = document.getElementById('audio-input');
        const audio = document.getElementById('main-audio');
        const display = document.querySelector('.track-display');
        const avatar = document.querySelector('.avatar-capsule');

        input.addEventListener('change', function() {
            const file = this.files[0];
            if(file) {
                const url = URL.createObjectURL(file);
                audio.src = url;
                display.innerText = "PLAYING: " + file.name.slice(0, 20).toUpperCase() + "...";
                audio.play();
            }
        });

        // 播放状态监听
        audio.onplay = () => avatar.classList.add('playing');
        audio.onpause = () => avatar.classList.remove('playing');
        audio.onended = () => avatar.classList.remove('playing');

        window.onload = typeWriter;
    </script>
</body>
</html>
