<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blurryspot | Ethereal Audio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain-overlay"></div>

    <nav>
        <div class="brand">blurryspot_</div>
        <div class="menu">
            <a href="https://y.music.163.com/m/user?id=你的ID" target="_blank">163 MUSIC</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="visual-core">
                <div class="avatar-wrapper">
                    <img src="b6d064695e6b23517263f7f5c76f6d66.jpg" alt="avatar" class="avatar-img">
                </div>
                <div class="liquid-shape"></div>
            </div>

            <div class="text-core">
                <div class="intro-line">
                    <span id="typing"></span>
                </div>
                <h1 class="main-title">混音，是捕捉<br><span class="blue-text">失焦的瞬间</span></h1>
                <p class="description">独立音乐人 / 音频后期 / 擅长用 FL Studio, FabFilter 与 SoundToys 勾勒情绪。</p>
            </div>
        </section>

        <section class="player-section">
            <div class="player-card">
                <div class="track-info">
                    <span class="label">CURRENT VIBE</span>
                    <span class="track-name">未命名音轨.mp3</span>
                </div>
                <div class="audio-ui">
                    <audio id="main-player" controls></audio>
                </div>
                <div class="upload-trigger">
                    <input type="file" id="audio-upload" hidden>
                    <label for="audio-upload" class="upload-label">
                        <span class="plus-icon">+</span> 载入你的声音碎片
                    </label>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
