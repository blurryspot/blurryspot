<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blurryspot | archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Inter:wght@300;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain-overlay"></div>
    <div class="grid-floor"></div>
    <div class="ocean-bg">
        <div class="fluid fluid-1"></div>
        <div class="fluid fluid-2"></div>
    </div>

    <nav>
        <div class="nav-brand">BLURRYSPOT_STUDIO</div>
        <div class="nav-links">
            <a href="https://music.163.com/" target="_blank">MUSIC</a>
            <a href="#archive">ARCHIVE</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="avatar-module">
                <div class="avatar-orbit"></div>
                <img src="avatar.png" alt="blurryspot" class="user-avatar">
            </div>
            <div class="typing-container">
                <span id="typing"></span><span class="cursor">_</span>
            </div>
            <h1 class="hero-title">捕捉<span class="blur-text">失焦</span>的声音</h1>
            <div class="status-tag">DRIFTING_DRAFTING</div>
        </section>

        <section class="work-grid">
            <div class="grid-container">
                <div class="grid-item" data-src="audio1.mp3">
                    <img src="cover1.jpg" alt="Fragment 01">
                    <div class="item-ripple"></div>
                </div>
                <div class="grid-item tall" data-src="audio2.mp3">
                    <img src="cover2.jpg" alt="Fragment 02">
                    <div class="item-ripple"></div>
                </div>
                <div class="grid-item" data-src="audio3.mp3">
                    <img src="cover3.jpg" alt="Fragment 03">
                    <div class="item-ripple"></div>
                </div>
                <div class="grid-item wide" data-src="audio4.mp3">
                    <img src="cover4.jpg" alt="Fragment 04">
                    <div class="item-ripple"></div>
                </div>
            </div>
        </section>

        <div class="marquee-strip">
            <div class="marquee-content">
                <span>drifting drafting_</span>
                <span>drifting drafting_</span>
                <span>drifting drafting_</span>
                <span>drifting drafting_</span>
            </div>
        </div>

        <section id="archive" class="projects">
            <div class="glass-module">
                <div class="module-header">
                    <div class="signal-indicator">
                        <span class="dot"></span> SIGNAL STRENGTH: OPTIMAL
                    </div>
                    <span id="track-name">SELECT A FRAGMENT FROM ABOVE...</span>
                </div>
                
                <audio id="main-audio" controls></audio>

                <div class="upload-zone">
                    <input type="file" id="audio-upload" accept="audio/*" hidden>
                    <label for="audio-upload" class="custom-button">
                        OR UPLOAD LOCAL FRAGMENT
                    </label>
                </div>
                <div class="footer-note">© 2026 BLURRYSPOT. ALL SIGNALS DRIFTING.</div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
    <script src="script.js"></script>
</body>
</html>
