<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blurryspot | my voices</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain-overlay"></div>

    <nav>
        <div class="nav-brand">blurryspot_</div>
        <div class="nav-links">
            <a href="https://music.163.com/#/user/home?id=你的ID" target="_blank">163 MUSIC</a>
            <a href="#projects">ARCHIVE</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="visual-engine">
                <a href="https://music.163.com/#/user/home?id=你的ID" target="_blank" class="avatar-link">
                    <div class="avatar-capsule">
                        <img src="avatar.png" alt="blurryspot" class="avatar-img">
                    </div>
                </a>
                <div class="liquid-glow"></div>
            </div>

            <div class="content-engine">
                <div class="highlight">
                    <span id="typing"></span><span class="cursor">_</span>
                </div>
                <h1 class="hero-title">我正在捕捉<span class="blue-italic">失焦</span>的声音。</h1>
                <p class="hero-sub">一名独立音乐人 </p>
                <p class="hero-bio">欢迎你收听我的声音</p>
            </div>
        </section>

        <div class="marquee">
            <div class="marquee-track">
                <span>drifting</span>
                <span>drifting</span>
            </div>
        </div>

        <section id="projects" class="projects">
            <div class="glass-player">
                <div class="player-header">
                    <div class="status-box">
                        <span class="dot"></span> LIVE SIGNAL
                    </div>
                    <span class="track-display">WAITING FOR INPUT...</span>
                </div>
                
                <audio id="main-audio" controls></audio>

                <div class="upload-area">
                    <input type="file" id="audio-input" accept="audio/*" hidden>
                    <label for="audio-input" class="upload-btn">
                        <span>+</span> 载入声音碎片 (UPLOAD)
                    </label>
                </div>

                <div class="legal-notice">
                    © 2026 blurryspot. 所有演示作品受版权保护。
                </div>
            </div>
        </section>
    </main>

    <script>
        // 1. 打字机效果
        const text = "Hi I'm Blurryspot";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typing").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 120);
            }
        }
        window.onload = typeWriter;

        // 2. 音频上传实时预览
        const input = document.getElementById('audio-input');
        const audio = document.getElementById('main-audio');
        const display = document.querySelector('.track-display');

        input.addEventListener('change', function() {
            const file = this.files[0];
            if(file) {
                const url = URL.createObjectURL(file);
                audio.src = url;
                display.innerText = file.name.toUpperCase();
                audio.play();
            }
        });
    </script>
</body>
</html>
