<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blurryspot | deep archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;900&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain-overlay"></div>
    <div class="grid-floor"></div>
    <div class="ocean-gradient"></div>

    <nav>
        <div class="nav-brand">BLURRYSPOT</div>
        <div class="nav-links">
            <a href="https://music.163.com/#/artist?id=97444644" target="_blank">163</a>
            <a href="#archive">ARCHIVE</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-content">
                <div class="avatar-minimal">
                    <img src="avatar.png" alt="blurryspot">
                    <div class="orbit"></div>
                </div>

                <div class="typing-container">
                    <span id="typing"></span><span class="cursor">|</span>
                </div>
                
                <h1 class="hero-title">正在捕捉<span class="focus-text">失焦</span>的声音</h1>
                <p class="hero-motto">drifting drafting_</p>
            </div>
        </section>

        <section class="signal-archives">
            <div class="archive-grid">
                <div class="archive-item" data-audio="audio1.mp3">
                    <img src="cover1.jpg" alt="SIGNAL_01">
                </div>
                <div class="archive-item" data-audio="audio2.mp3">
                    <img src="cover2.jpg" alt="SIGNAL_02">
                </div>
                <div class="archive-item" data-audio="audio3.mp3">
                    <img src="cover3.jpg" alt="SIGNAL_03">
                </div>
                <div class="archive-item" data-audio="audio4.mp3">
                    <img src="cover4.jpg" alt="SIGNAL_04">
                </div>
            </div>
        </section>

        <div class="marquee-simple">
            <div class="marquee-track">
                <span>drifting drafting_</span>
                <span>drifting drafting_</span>
                <span>drifting drafting_</span>
                <span>drifting drafting_</span>
            </div>
        </div>

        <section id="archive" class="player-section">
            <div class="player-container">
                <div class="player-meta">
                    <div class="signal-dot"></div>
                    <span id="track-name">SILENCE / 等待信号载入</span>
                </div>
                
                <audio id="main-audio" controls></audio>

                <div class="upload-area">
                    <input type="file" id="audio-upload" accept="audio/*" hidden>
                    <label for="audio-upload" class="minimal-btn">LOAD FRAGMENTS</label>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
