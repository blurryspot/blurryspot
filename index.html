<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blurryspot | Audio Post-Production</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cursor-follower"></div>

    <nav>
        <div class="logo">B.S_LAB</div>
        <ul class="nav-links">
            <li><a href="#about">INTRO</a></li>
            <li><a href="#works">PROJECTS</a></li>
            <li><a href="#contact">CONTACT</a></li>
        </ul>
    </nav>

    <section id="about" class="hero">
        <div class="hero-bg-glow"></div>
        
        <div class="hero-content">
            <a href="https://y.music.163.com/m/user?id=你的ID" target="_blank" class="avatar-link">
                <div class="avatar-container">
                    <img src="b6d064695e6b23517263f7f5c76f6d66.jpg" alt="blurryspot avatar" class="main-avatar">
                    <div class="avatar-echo"></div>
                </div>
            </a>

            <div class="highlight-text">
                <span id="typing-text"></span><span class="cursor">|</span>
            </div>
            
            <h1 class="main-title">blurryspot</h1>
            <p class="role-tag">音频后期实习生 / 独立音乐人</p>
            
            <div class="copyright-statement">
                <p>🔒 所有作品均为原创，受版权保护，未经授权禁止商用。</p>
            </div>
        </div>
    </section>

    <div class="marquee-stripe">
        <div class="marquee-content">
            FL STUDIO PRECISE EDITING / FABFILTER PRO SUITE / SOUNDTOYS COLORING / MASTERING / AI-DRIVEN AUDIO WORKFLOW / 
        </div>
    </div>

    <section id="works" class="works-section">
        <h2 class="section-title">VIBE ARCHIVE</h2>
        <div class="audio-grid" id="audio-container">
            <div class="glass-card">
                <div class="card-header">
                    <span class="status-dot"></span>
                    <span class="track-title">Selected Demo - 01</span>
                </div>
                <audio controls>
                    <source src="#" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <div class="upload-zone">
            <input type="file" id="upload-input" accept="audio/*" hidden>
            <button class="cypher-btn" onclick="document.getElementById('upload-input').click()">
                DROP YOUR SOUND HERE
            </button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
