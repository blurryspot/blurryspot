<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blurryspot | drifting archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain-overlay"></div>
    <div class="grid-floor"></div>

    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="nav-brand">BLURRYSPOT_V3.0</div>
        <div class="nav-links">
            <a href="https://music.163.com/" target="_blank">MUSIC</a>
            <a href="#archive">ARCHIVE</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <span class="acid-star star-1">✦</span>
            <span class="acid-star star-2">✦</span>

            <div class="avatar-container">
                <div class="avatar-ring"></div>
                <img src="avatar.png" alt="blurryspot" class="user-avatar">
            </div>

            <div class="typing-area">
                <span id="typing"></span><span class="cursor">_</span>
            </div>
            
            <h1 class="hero-title">捕捉<span class="out-of-focus">失焦</span>的声音</h1>
            <div class="hero-tag">DRIFTING DRAFTING_ARCHIVE</div>
        </section>

        <div class="marquee">
            <div class="marquee-track">
                <span>drifting drafting_...</span>
                <span>drifting drafting_...</span>
                <span>drifting drafting_...</span>
                <span>drifting drafting_...</span>
            </div>
        </div>

        <section id="archive" class="projects">
            <div class="glass-player">
                <div class="player-header">
                    <div class="status-box"><span class="status-dot"></span> SIGNAL: ACTIVE</div>
                    <span id="track-name">READY TO CAPTURE...</span>
                </div>
                <audio id="main-audio" controls></audio>
                <div class="controls-ui">
                    <input type="file" id="audio-upload" accept="audio/*" hidden>
                    <label for="audio-upload" class="upload-btn">LOAD SOUND FRAGMENT</label>
                </div>
                <div class="legal">© 2026 BLURRYSPOT. ALL FRAGMENTS DRIFTING.</div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
