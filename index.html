<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blurryspot | 我正在捕捉失焦的声音</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #080808;
            --accent-blue: #4a90e2;
            --text-main: #f5f5f5;
            --text-dim: #777;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            cursor: crosshair;
            line-height: 1.5;
        }

        /* --- 1. 胶片颗粒与背景层 --- */
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.07;
            pointer-events: none;
            z-index: 100;
        }

        /* 液体流动背景 (下半部分) */
        .liquid-floor {
            position: fixed;
            bottom: -15%;
            left: -10%;
            width: 120%;
            height: 70%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.6;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
            animation: move 25s infinite alternate ease-in-out;
        }

        .blob-1 { width: 800px; height: 800px; bottom: 0; left: -10%; opacity: 0.3; }
        .blob-2 { width: 600px; height: 600px; bottom: 10%; right: 0; background: radial-gradient(circle, #2c3e50 0%, transparent 70%); animation-delay: -5s; }
        .blob-3 { width: 500px; height: 500px; bottom: -5%; left: 30%; background: radial-gradient(circle, #1a2a6c 0%, transparent 70%); animation-delay: -10s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(10%, -15%) scale(1.1) rotate(10deg); }
            100% { transform: translate(-5%, 5%) scale(0.9) rotate(-10deg); }
        }

        /* --- 2. 导航与布局 --- */
        nav {
            padding: 50px 80px;
            display: flex;
            justify-content: space-between;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 10;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 40px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--accent-blue); }

        /* --- 3. 核心英雄区 --- */
        .hero {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
        }

        .typing-box {
            font-family: 'Space Mono', monospace;
            color: var(--accent-blue);
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 1.5em;
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 6.5rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -4px;
            margin-bottom: 40px;
        }

        /* --- “失焦” 毛刺交互 --- */
        .out-of-focus {
            display: inline-block;
            color: var(--accent-blue);
            font-style: italic;
            transition: 0.3s ease;
            position: relative;
        }

        .hero-title:hover .out-of-focus {
            filter: blur(3px);
            animation: glitch 0.2s infinite;
            text-shadow: 
                3px 0 #ff0055, 
                -3px 0 #00ff95,
                0 0 20px rgba(74, 144, 226, 0.4);
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            25% { transform: translate(-3px, 1px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-1px, 2px); }
            100% { transform: translate(0); }
        }

        .hero-sub {
            max-width: 550px;
            color: var(--text-dim);
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.8;
        }

        /* --- 4. 极简播放器 --- */
        .projects { padding: 100px 10%; }

        .glass-player {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px;
            max-width: 800px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6);
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--accent-blue);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 15px var(--accent-blue);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 50% { opacity: 0.2; } }

        audio {
            width: 100%;
            margin: 30px 0;
            filter: invert(1) hue-rotate(180deg) brightness(1.5);
            opacity: 0.3;
            transition: 0.5s;
        }

        audio:hover { opacity: 0.7; }

        .upload-btn {
            display: inline-block;
            padding: 22px 45px;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            text-decoration: none;
            border-radius: 100px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
        }

        .upload-btn:hover {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 0 40px rgba(74, 144, 226, 0.4);
            transform: translateY(-5px);
        }

        /* --- 5. 滚动跑马灯 --- */
        .marquee {
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 40px 0;
            overflow: hidden;
            background: rgba(255,255,255,0.01);
        }

        .marquee-track {
            display: flex;
            width: 200%;
            animation: scroll 30s linear infinite;
        }

        .marquee span {
            font-size: 100px;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.05);
            margin-right: 100px;
            text-transform: uppercase;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        @media (max-width: 768px) {
            nav { padding: 30px; }
            .hero-title {
