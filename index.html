<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blurryspot | my voices</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain-overlay"></div>

    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="nav-brand">blurryspot_</div>
        <div class="nav-links">
            <a href="https://music.163.com/" target="_blank">MUSIC</a>
            <a href="#archive">ARCHIVE</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="typing-area">
                <span id="typing"></span><span class="cursor">_</span>
            </div>
            <h1 class="hero-title">
                我正在捕捉<span class="out-of-focus">失焦</span>的声音。
            </h1>
            <p class="hero-sub">
                独立音乐人
            </p>
        </section>

        <div class="marquee">
            <div class="marquee-track">
                <span>blurry sounds</span>
                <span>ambient textures</span>
                <span>captured signals</span>
                <span>blurry sounds</span>
                <span>ambient textures</span>
            </div>
        </div>

        <section id="archive" class="projects">
            <div class="glass-player">
                <div class="player-header">
                    <div class="status-box">
                        <span class="status-dot"></span> SIGNAL STRENGTH: ACTIVE
                    </div>
                    <span id="track-name">IDLE: WAITING FOR FRAGMENT...</span>
                </div>
                
                <audio id="main-audio" controls></audio>

                <div class="controls-ui">
                    <input type="file" id="audio-upload" accept="audio/*" hidden>
                    <label for="audio-upload" class="upload-btn">
                        + LOAD SOUND FRAGMENT / 载入声音碎片
                    </label>
                </div>
                <div class="legal">© 2026 blurryspot. All audio fragments reserved.</div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
